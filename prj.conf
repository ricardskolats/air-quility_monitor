# SPDX-License-Identifier: Apache-2.0
# Air Quality Monitor - Main Configuration

# ============================================================================
# GENERAL
# ============================================================================
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# C++ Support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_NEWLIB_LIBC=y

# ============================================================================
# LOGGING
# ============================================================================
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ============================================================================
# DATE-TIME
# ============================================================================
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_MODEM=y
CONFIG_DATE_TIME_AUTO_UPDATE=y
CONFIG_DATE_TIME_UPDATE_INTERVAL_SECONDS=14400

# ============================================================================
# FLASH / NVS STORAGE
# ============================================================================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_NVS_LOG_LEVEL_WRN=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ============================================================================
# NETWORKING
# ============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_NATIVE=n

# ============================================================================
# MODEM / LTE
# ============================================================================
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_AUTO_INIT_AND_CONNECT=n

# PSM (Power Saving Mode)
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00000110"
CONFIG_LTE_PSM_REQ_RAT="00000000"

# ============================================================================
# MQTT
# ============================================================================
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=120
CONFIG_MQTT_HELPER=y

# ============================================================================
# TLS / SECURITY
# ============================================================================
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_TLS_VERSION_1_2=y
CONFIG_MBEDTLS_DTLS=n
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096

# ============================================================================
# CBOR (zcbor)
# ============================================================================
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y

# ============================================================================
# REBOOT / WATCHDOG
# ============================================================================
CONFIG_REBOOT=y

# ============================================================================
# APPLICATION SPECIFIC (defined in Kconfig)
# ============================================================================
CONFIG_AQM_SENSOR_INTERVAL_SEC=300
CONFIG_AQM_UPLOAD_INTERVAL_SEC=1800
CONFIG_AQM_BUFFER_SIZE=128
CONFIG_AQM_BUFFER_HIGH_WATER_PERCENT=80
CONFIG_AQM_MQTT_BROKER_HOSTNAME="mqtt.example.com"
CONFIG_AQM_MQTT_BROKER_PORT=8883
CONFIG_AQM_MQTT_CLIENT_ID_PREFIX="aqm_"
CONFIG_AQM_LOG_BUFFER_SIZE=32
