# Board-specific configuration for Thingy:91

# Use non-secure build (required for modem access)
CONFIG_BOARD_ENABLE_DCDC_APP=y
CONFIG_BOARD_ENABLE_DCDC_HV=y

# GPIO for LEDs
CONFIG_GPIO=y

# Thingy:91 has BME680 sensor - but we use stubs for this exercise
# CONFIG_SENSOR=y
# CONFIG_BME680=y
